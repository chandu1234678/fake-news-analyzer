<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <title>Viral Spread Monitor — PiNE AI</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* Viral page — scoped styles that don't belong in shared.css */
    .viral-page-wrap {
      display: flex; flex-direction: column;
      width: 420px; height: 600px; overflow: hidden;
      background: var(--bg);
    }

    /* Gradient header */
    .viral-hero {
      background: linear-gradient(135deg, rgba(252,165,165,0.18) 0%, rgba(252,165,165,0.06) 100%);
      border-bottom: 1px solid rgba(252,165,165,0.2);
      padding: 0 14px; height: 46px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .viral-hero-title {
      flex: 1; font-size: 13.5px; font-weight: 700; color: var(--fake);
      display: flex; align-items: center; gap: 6px;
    }
    .viral-hero-sub {
      font-size: 10px; color: var(--t3); font-weight: 400;
    }

    /* Stats grid */
    .viral-stats-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 8px; padding: 12px 14px;
      border-bottom: 1px solid var(--b1);
      flex-shrink: 0;
    }
    .viral-stat-card {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: 9px; padding: 10px 12px; text-align: center;
    }
    .viral-stat-value {
      font-size: 22px; font-weight: 800; line-height: 1;
      margin-bottom: 3px;
    }
    .viral-stat-value.v-viral    { color: var(--fake); }
    .viral-stat-value.v-trending { color: var(--warn); }
    .viral-stat-value.v-normal   { color: var(--accent); }
    .viral-stat-label {
      font-size: 10px; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    }

    /* Scrollable body */
    .viral-body {
      flex: 1; overflow-y: auto; padding: 12px 14px 14px;
      scrollbar-width: thin; scrollbar-color: var(--b2) transparent;
    }
    .viral-body::-webkit-scrollbar { width: 3px; }
    .viral-body::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

    /* Section */
    .viral-section-title {
      font-size: 10px; font-weight: 600; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.07em;
      display: flex; align-items: center; gap: 5px;
      margin-bottom: 8px; margin-top: 14px;
    }
    .viral-section-title:first-child { margin-top: 0; }

    /* Chart */
    .viral-chart {
      height: 80px; margin-bottom: 4px;
      display: flex; align-items: flex-end; gap: 3px;
    }
    .viral-chart-bar {
      flex: 1; border-radius: 3px 3px 0 0; min-height: 2px;
      background: var(--a-dim); border: 1px solid var(--a-bdr);
      transition: opacity 0.15s; cursor: default;
    }
    .viral-chart-bar.has-viral {
      background: rgba(252,165,165,0.18); border-color: rgba(252,165,165,0.3);
    }
    .viral-chart-bar:hover { opacity: 0.7; }

    /* Claim card */
    .viral-claim-card {
      background: var(--s1); border: 1px solid var(--b1);
      border-radius: 9px; padding: 11px 12px; margin-bottom: 8px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .viral-claim-card:hover { background: var(--s2); border-color: var(--b2); }

    .viral-claim-header {
      display: flex; align-items: center; gap: 7px; margin-bottom: 6px;
    }
    .viral-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 5px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .viral-badge.viral {
      background: rgba(252,165,165,0.12); color: var(--fake);
      border: 1px solid rgba(252,165,165,0.25);
    }
    .viral-badge.trending {
      background: rgba(252,211,77,0.10); color: var(--warn);
      border: 1px solid rgba(252,211,77,0.22);
    }

    .viral-claim-text {
      font-size: 12.5px; line-height: 1.55; color: var(--t1);
      margin-bottom: 7px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .viral-claim-meta {
      display: flex; align-items: center; gap: 10px;
      font-size: 10px; color: var(--t3);
    }
    .viral-claim-meta-item {
      display: flex; align-items: center; gap: 3px;
    }
    .viral-velocity-bar {
      height: 3px; background: var(--b1); border-radius: 2px;
      overflow: hidden; margin-top: 7px;
    }
    .viral-velocity-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--warn), var(--fake));
      transition: width 0.4s ease;
    }

    /* Empty state */
    .viral-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 20px; text-align: center;
      gap: 6px;
    }

    /* Refresh FAB */
    .viral-refresh-fab {
      position: fixed; bottom: 16px; right: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: #101419;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
      transition: opacity 0.15s, transform 0.15s;
      z-index: 50;
    }
    .viral-refresh-fab:hover { opacity: 0.85; transform: scale(1.05); }
    .viral-refresh-fab.spinning .material-symbols-outlined {
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>
<div class="viral-page-wrap">

  <!-- Header -->
  <div class="viral-hero">
    <button id="back-btn" class="back-btn" aria-label="Go back" style="color:var(--fake)">
      <span class="material-symbols-outlined ms-20">arrow_back</span>
    </button>
    <div class="viral-hero-title">
      <span class="material-symbols-outlined ms-16">warning</span>
      Viral Spread Monitor
      <span class="viral-hero-sub">Real-time tracking</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="viral-stats-grid" role="status" aria-label="Viral statistics">
    <div class="viral-stat-card">
      <div class="viral-stat-value v-viral" id="stat-viral">0</div>
      <div class="viral-stat-label">Viral Claims</div>
    </div>
    <div class="viral-stat-card">
      <div class="viral-stat-value v-trending" id="stat-trending">0</div>
      <div class="viral-stat-label">Trending</div>
    </div>
    <div class="viral-stat-card">
      <div class="viral-stat-value v-normal" id="stat-total">0</div>
      <div class="viral-stat-label">Total Tracked</div>
    </div>
    <div class="viral-stat-card">
      <div class="viral-stat-value v-normal" id="stat-checks">0</div>
      <div class="viral-stat-label">Total Checks</div>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="viral-body">

    <!-- Spread chart -->
    <div class="viral-section-title">
      <span class="material-symbols-outlined ms-12">trending_up</span>
      Spread Pattern (Last 24h)
    </div>
    <div class="viral-chart" id="chart-bars" aria-label="Spread chart" role="img"></div>

    <!-- Viral alerts -->
    <div class="viral-section-title">
      <span class="material-symbols-outlined ms-12">warning</span>
      Viral Alerts
    </div>
    <div id="viral-claims-list"></div>

    <!-- Trending -->
    <div class="viral-section-title">
      <span class="material-symbols-outlined ms-12">whatshot</span>
      Trending Claims
    </div>
    <div id="trending-claims-list"></div>

  </div>

</div>

<!-- Refresh FAB -->
<button class="viral-refresh-fab" id="refresh-btn" aria-label="Refresh data">
  <span class="material-symbols-outlined ms-18">refresh</span>
</button>

<script src="config.js"></script>
<script src="viral.js"></script>
</body>
</html>
