<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verification Detail — FactCheck AI</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">

  <header class="page-header">
    <button id="back-btn" class="back-btn" aria-label="Go back">
      <span class="material-symbols-outlined ms-20">arrow_back</span>
    </button>
    <h1>Verification Detail</h1>
    <button id="save-btn" class="icon-btn" title="Save claim" aria-label="Save claim">
      <span class="material-symbols-outlined ms-20">bookmark_add</span>
    </button>
    <button id="feedback-btn" class="icon-btn" title="Report wrong verdict" aria-label="Report wrong verdict" style="margin-left:2px">
      <span class="material-symbols-outlined ms-20">flag</span>
    </button>
  </header>

  <div class="page-body no-nav" id="detail-content">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:8px">
      <span class="material-symbols-outlined empty-state-icon">search_off</span>
      <div class="empty-state-title">No detail data found</div>
      <div class="empty-state-sub">Go back and open a claim from history</div>
    </div>
  </div>

</div>
<script src="config.js"></script>
<script src="detail.js"></script>
</body>
</html>
