<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Queue — FactCheck AI</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="page-wrap">

  <header class="page-header">
    <button id="back-btn" class="back-btn">
      <span class="material-symbols-outlined ms-20">arrow_back</span>
    </button>
    <h1>Review Queue</h1>
    <button id="refresh-btn" class="icon-btn" title="Refresh queue">
      <span class="material-symbols-outlined ms-20">refresh</span>
    </button>
  </header>

  <!-- Stats bar -->
  <div class="review-stats-bar">
    <div class="review-stat-item">
      <span class="review-stat-num" id="stat-pending">-</span>
      <span class="review-stat-label">Pending</span>
    </div>
    <div class="review-stat-item">
      <span class="review-stat-num" id="stat-today">-</span>
      <span class="review-stat-label">Today</span>
    </div>
    <div class="review-stat-item">
      <span class="review-stat-num" id="stat-priority">-</span>
      <span class="review-stat-label">Priority</span>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="review-filters">
    <button class="review-filter-btn active" data-filter="all">All</button>
    <button class="review-filter-btn" data-filter="viral">Viral</button>
    <button class="review-filter-btn" data-filter="trending">Trending</button>
    <button class="review-filter-btn" data-filter="coordinated">Coordinated</button>
  </div>

  <div class="page-body" id="review-content">
    <div class="review-loading">
      <div class="spin-ring"></div>
      <div style="margin-top:12px;font-size:12px;color:var(--t3)">Loading review queue...</div>
    </div>
  </div>

</div>

<!-- Bottom navigation -->
<nav class="bottom-nav">
  <a href="popup.html">
    <span class="material-symbols-outlined">chat</span>
    <span>Chat</span>
  </a>
  <a href="dashboard.html">
    <span class="material-symbols-outlined">dashboard</span>
    <span>Dashboard</span>
  </a>
  <a href="review.html" class="active">
    <span class="material-symbols-outlined">fact_check</span>
    <span>Review</span>
  </a>
  <a href="history.html">
    <span class="material-symbols-outlined">history</span>
    <span>History</span>
  </a>
  <a href="settings.html">
    <span class="material-symbols-outlined">settings</span>
    <span>Settings</span>
  </a>
</nav>

<!-- WebSocket Status Indicator -->
<div class="ws-status" id="ws-status">
  <div class="ws-status-dot"></div>
  <span class="ws-status-text">Live</span>
</div>

<script src="config.js"></script>
<script src="websocket_client.js"></script>
<script src="review.js"></script>
</body>
</html>
