<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <title>FactCheck AI</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="sidebar-logo-text"><span class="brand-main">FactChecker</span><span class="brand-ai"> AI</span></span>
      </div>
      <button id="close-sidebar-btn" class="icon-btn">
        <span class="material-symbols-outlined ms-16">close</span>
      </button>
    </div>

    <button id="new-chat-sidebar-btn" class="sidebar-new-btn">
      <span class="material-symbols-outlined ms-14">add</span>
      New Chat
    </button>

    <div id="sessions-list" class="scroll"></div>

    <nav class="sidebar-nav">
      <a id="nav-dashboard">
        <span class="material-symbols-outlined ms-16">grid_view</span> Dashboard
      </a>
      <a id="nav-saved">
        <span class="material-symbols-outlined ms-16">bookmark</span> Saved
      </a>
      <a id="nav-history">
        <span class="material-symbols-outlined ms-16">history</span> History
      </a>
      <a id="nav-settings">
        <span class="material-symbols-outlined ms-16">settings</span> Settings
      </a>
    </nav>

    <div class="sidebar-user">
      <div id="sidebar-avatar" class="sidebar-avatar">?</div>
      <div class="sidebar-user-info">
        <div id="sidebar-name" class="u-name">—</div>
        <div id="sidebar-email" class="u-email"></div>
      </div>
      <button id="logout-btn" class="logout-btn" title="Sign out">
        <span class="material-symbols-outlined ms-16">logout</span>
      </button>
    </div>
  </div>

  <!-- Main shell -->
  <div class="app-shell">
    <header class="app-header">
      <button id="open-sidebar-btn" class="icon-btn">
        <span class="material-symbols-outlined ms-20">menu</span>
      </button>
      <div class="header-logo">
        <span id="chat-title" class="logo-text"><span class="brand-main">FactChecker</span><span class="brand-ai"> AI</span></span>
      </div>
      <button id="new-chat-btn" class="icon-btn" title="New chat">
        <span class="material-symbols-outlined ms-18">edit_square</span>
      </button>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
      <!-- Attachment preview bar -->
      <div id="attach-preview-bar" style="display:none;align-items:center;gap:8px;padding:4px 12px 2px;font-size:11px;color:var(--t3)">
        <span class="material-symbols-outlined ms-12" id="attach-preview-icon" style="color:var(--accent)">image</span>
        <span id="attach-preview-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <button id="attach-remove-btn" style="background:none;border:none;cursor:pointer;color:var(--t3);padding:0;line-height:1">
          <span class="material-symbols-outlined ms-12">close</span>
        </button>
      </div>

      <div class="input-box">
        <!-- + attach menu -->
        <div style="position:relative">
          <button id="attach-btn" class="icon-btn" title="Attach file" style="position:relative">
            <span class="material-symbols-outlined ms-18">add_circle</span>
          </button>
          <div id="attach-menu" style="display:none;position:absolute;bottom:40px;left:0;background:var(--surface);border:1px solid var(--a-bdr);border-radius:12px;padding:6px;min-width:150px;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:100">
            <label class="attach-menu-item">
              <span class="material-symbols-outlined ms-14">image</span> Image
              <input type="file" id="file-image" accept="image/*" style="display:none">
            </label>
            <label class="attach-menu-item">
              <span class="material-symbols-outlined ms-14">picture_as_pdf</span> PDF
              <input type="file" id="file-pdf" accept=".pdf" style="display:none">
            </label>
            <label class="attach-menu-item">
              <span class="material-symbols-outlined ms-14">description</span> Text file
              <input type="file" id="file-txt" accept=".txt,.md,.csv,.doc,.docx" style="display:none">
            </label>
          </div>
        </div>

        <textarea id="input-text" rows="1" placeholder="Ask anything or paste a claim…"></textarea>
        <button id="send-btn">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
