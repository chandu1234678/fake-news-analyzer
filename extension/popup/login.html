<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420">
  <title>FactCheck AI — Login</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="login-wrap">

  <div class="login-header">
    <img src="../icons/logo.png" alt="FactChecker AI" class="login-logo-icon">
    <div class="login-brand">
      <span class="brand-main">FactChecker</span><span class="brand-ai"> AI</span>
    </div>
    <p class="login-tagline">Verify information before you believe it</p>
  </div>

  <div class="login-tabs">
    <button id="tab-login" class="login-tab active">Sign In</button>
    <button id="tab-signup" class="login-tab">Create Account</button>
  </div>

  <div class="login-body">
    <div id="error-box" class="error-box"></div>

    <!-- Login form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="login-password" type="password" placeholder="••••••••" class="form-input">
      </div>
      <button id="login-btn" class="form-btn">Sign In</button>
      <div style="text-align:right;margin-top:6px;">
        <button id="forgot-btn" class="link-btn">Forgot password?</button>
      </div>
      <div class="divider-row">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>
      <button id="google-login-btn" class="google-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Signup form -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input id="signup-name" type="text" placeholder="Your name" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="signup-password" type="password" placeholder="Min 6 characters" class="form-input">
      </div>
      <button id="signup-btn" class="form-btn">Create Account</button>
      <div class="divider-row">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>
      <button id="google-signup-btn" class="google-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Forgot password — step 1: enter email -->
    <div id="form-forgot" style="display:none">
      <p style="font-size:12px;color:var(--t3);margin-bottom:14px;">Enter your email and we'll send a 6-digit code.</p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="forgot-email" type="email" placeholder="you@example.com" class="form-input">
      </div>
      <button id="send-otp-btn" class="form-btn">Send Code</button>
      <div style="text-align:center;margin-top:10px;">
        <button id="back-to-login-btn" class="link-btn">← Back to Sign In</button>
      </div>
    </div>

    <!-- Forgot password — step 2: enter OTP + new password -->
    <div id="form-reset" style="display:none">
      <p style="font-size:12px;color:var(--t3);margin-bottom:14px;">Enter the 6-digit code sent to your email.</p>
      <div class="form-group">
        <label class="form-label">Code</label>
        <input id="reset-otp" type="text" placeholder="123456" maxlength="6" class="form-input" style="letter-spacing:6px;font-size:18px;text-align:center;">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input id="reset-password" type="password" placeholder="Min 6 characters" class="form-input">
      </div>
      <button id="reset-btn" class="form-btn">Reset Password</button>
      <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--t3)">
        <span id="resend-timer-text">Resend code in <strong id="resend-countdown">60</strong>s</span>
        <button id="resend-otp-btn" class="link-btn" style="display:none">Resend code</button>
      </div>
      <div style="text-align:center;margin-top:8px;">
        <button id="back-to-login-from-reset-btn" class="link-btn">← Back to Sign In</button>
      </div>
    </div>
  </div>

  <div class="login-footer">By continuing you agree to our Terms of Service</div>

</div>
<script src="config.js"></script>
<script src="login.js"></script>
</body>
</html>
